<!DOCTYPE html>
<html>
	<head>
		<title> Online EDU login </title>
	
	</head>
	
	<style>
		{
	   padding:0;
	   margin:0;
	  }
    body{
            background-image:url(uu.jpg);
            background-size:cover;
			background-repeat:no-repeat;
            background-position:cover;
            font-family:fancy monospace;
			height:130vh;
        }	
	
	.btnLogin-popup{
		width:120px;
		height:50px;
		background:transparent;
		border:2px solid #fff;
		outline:none;
		border-radius:4px;
		cursor:pointer;
		font-size:1.1em;
		color:#fff;
		font-weight:500;
		margin-left:40px;
		
	}
	.btnLogin-popup:hover{
		background:#E83D5E;
		color:#fff;
	}
	.wrapper{
		position:relative;
		width:600px;
		height:600px;
		background:transparent;
		border:2px solid rgba(255, 255, 255, .5);
		border-radius:20px;
		backdrop-filter: blue(20px);
		box-shadow:0 0 30px rgba(0, 0, 0, .5);
		display:flex;
		justify-content:center;
		align-items:center;
		
		/*overflow:hidden; */ 
		
		transition: transform .5 ease, height.2s ease;
	}
	.wrapper.active-popup{
		transform:scale(1);
	}
	
	
	.wrapper.active{
        height:520px;
	}		

	.wrapper .form-box{
		width:70%;
		padding:40px;
	}
	.wrapper .form-box.login{
            transition:transform.18s ease;
            transform:translateX(0);			
		}
	.wrapper.active .form-box.login{
	    transition:none;
        transform:translateX(-400px);
	}    	
	.wrapper .form-box.register{
		position:absolute;
		transition:none;
		transform:translateY(450px);		
	}
	
	.wrapper.active .form-box.register{
	    transition:transform .18s ease;
        transform:translateX(0);
	}
		
	.wrapper .icon-close{
		position:absolute;
		top:0;
		right:0;
		height:45px;
		width:45px;
		background::#E83D5E;
		font-size:2em;
		color:#BA1737;
		display:flex;
		justify-content:center;
		align-items:center;
		border-bottom-left-radius:20px;
		cursor:pointer;
		z-index:1;
	}	
	.form-box{
		font-size:17px;
		color:#162938;
		text-align:center;
	}
	.input-box{
		position:relative;
		width:100%;
        height:50px;
        border-bottom:2px solid #162938;
        margin:30px 0;
	}	
    .input-box	lable{
		position:absolute;
		top:50%;
		left:5px;
		transform:translateY(-50%);
		font-size:1em;
		color:#162938;
		font-weight:500;
		pointer-events:none;
		
	}
	.input-box input:facus~lable,
	.input-box input:valid~lable{
		top:-5px;
	}	
	.input-box input{
		width:100%;
		height:100%;
		background:transparent;
		border:none;
		outline:none;
		font-size:1em;
		color:#162938;
		font-weight:600;
		padding:0 35px 0 5px;
	}
	.input-box  .icon{
		position:absolute;
		right:8px;
		font-size:1.2em;
		color:#162938;
		line-height:57px;
	}
	.remember-forgot{
		font-size:.9em;
		color:#162938;
		font-weight:500;
		margin:-15px 0 15px;
		display:flex;
		justify-content:space-between;
	}
	.remember-forgot lable input{ 
	    color:#162938;
		margin-right:3px;
	}
	.remember-forgot a{
		color:#162938;
		text-decoration:none;
	}
	.remember-forgot a:hover{
        text-decoration:underline;
	}
    .btn{
            width:100%;
            height:45px;
            background:	#BA1737;
            border:none;
            outline:none;
            border-radius:6px;
            cursor:pointer;
			font-size:1em;
			color:#fff;
			font-weight:500;
			
	}
	.btn a {
        text-decoration:none;
		color:#fff;
		
		}
	 
	
	</style>
	
	<body>
		  <div align="center">
			
	<div class="wrapper">
	        <span class="icon-close"><i class="fa fa-window-close"></i></span>
			
	   <div class="form-box login">
	       <h2> Online Education <center> Login</center></h2>
				<form action="#">
		       <div class="input-box">
			       <span class="icon"><i class="fa fa-envelope"></i></span>
                   <input type="email" required>
                   <label> Email </label>
          		</div>
					<div class="input-box">
			       <span class="icon"><i class="fa fa-envelope"></i></span>
                   <input type="Username" required>
                   <label> Username </label>
          		</div>
                <div class="input-box">
                    <span class="icon"><i class="fa fa-lock"></i></span>
                    <input type="password" required>
                    <label> Password</label>
                </div>
				<div class="remember-forgot">
				   <label><input type="checkbox">Remember me </label>
				   <a href="#">Forgot Password</a>
				</div>  
                <button type="submit"class="btn"><a href="file:///C:/Users/nikes/Desktop/education%20application/Cources.html"> Login</a></button>
                <div class="login-register">	
                    <p> Don't have an account?<a href="file:///C:/Users/nikes/Desktop/education%20application/sign.html" class="register-link">Register</a></p>
                </div>					
            </form>
			</div>
        </div>
	  </div>	
	
	</body>

</html>
