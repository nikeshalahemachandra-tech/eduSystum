<!DOCTYPE html>
<html>
    <head>
        <title> Online Edu register</title>
	</head>
	
    <style>
		{
	   padding:0;
	   margin:0;
	  }
    body{
            background-image:url(uu.jpg);
            background-size:cover;
			background-repeat:no-repeat;
            background-position:cover;
            font-family:fancy monospace;
			height:130vh;
        }
    		
	.wrapper{
		position:relative;
		width:600px;
		height:620px;
		background:transparent;
		border:2px solid rgba(255, 255, 255, .5);
		border-radius:20px;
		backdrop-filter: blue(20px);
		box-shadow:0 0 30px rgba(0, 0, 0, .5);
		display:flex;
		justify-content:center;
		align-items:center;
		
		/*overflow:hidden; */ 
		
		transition: transform .5 ease, height.2s ease;
	}
	.wrapper.active-popup{
		transform:scale(1);
	}
	
	
	.wrapper.active{
        height:520px;
	}		

	.wrapper .form-box{
		width:70%;
		padding:40px;
	}
	.wrapper .form-box.login{
            transition:transform.18s ease;
            transform:translateX(0);			
		}
	.wrapper.active .form-box.login{
	    transition:none;
        transform:translateX(-400px);
	}    	
    .wrapper .form-box.register{
		position:absolute;
		transition:none;
		transform:traslateY(450px);		
	}
	.wrapper.active .form-box.register{
	    transition:transform .18s ease;
        transform:translateX(0);
	}
	.wrapper .icon-close{
		position:absolute;
		top:0;
		right:0;
		height:45px;
		width:45px;
		background::#E83D5E;
		font-size:2em;
		color:#BA1737;
		display:flex;
		justify-content:center;
		align-items:center;
		border-bottom-left-radius:20px;
		cursor:pointer;
		z-index:1;
	}	
	.form-box{
		font-size:17px;
		color:#162938;
		text-align:center;
	}
	.input-box{
		position:relative;
		width:100%;
        height:40px;
        border-bottom:2px solid #162938;
        margin:30px 0;
	}	
    .input-box	lable{
		position:absolute;
		top:50%;
		left:5px;
		transform:translateY(-50%);
		font-size:1em;
		color:#162938;
		font-weight:500;
		pointer-events:none;
	}
	.input-box input:facus~lable,
	.input-box input:valid~lable{
		top:-5px;
	}	
	.input-box input{
		width:100%;
		height:100%;
		background:transparent;
		border:none;
		outline:none;
		font-size:1em;
		color:#162938;
		font-weight:600;
		padding:0 35px 0 5px;
	}
	.input-box  .icon{
		position:absolute;
		right:8px;
		font-size:1.2em;
		color:#162938;
		line-height:57px;
	}
	.remember-forgot{
		font-size:.9em;
		color:#162938;
		font-weight:500;
		margin:-15px 0 15px;
		display:flex;
		justify-content:space-between;
	}
	.remember-forgot lable input{ 
	    color:#162938;
		margin-right:3px;
	}
	.remember-forgot a{
		color:#162938;
		text-decoration:none;
	}
	.remember-forgot a:hover{
        text-decoration:underline;
	}
    .btn{
            width:100%;
            height:45px;
            background:	#BA1737;
            border:none;
            outline:none;
            border-radius:6px;
            cursor:pointer;
			font-size:1em;
			color:#fff;
			font-weight:500;
	}
	.btn a {
	    text-decoration:none;
		color:#fff;
		}

	</style>
	
	<body>
		  <div align="center">
	<div class="wrapper">
	        <span class="icon-close"><i class="fa fa-window-close"></i></span>
				
	 <div class="form-box register">
	       <h2> Online Eduction <center>Registation</center> </h2>
		   <form action="#">
		       <div class="input-box">
			       <span class="icon"><i class="fa fa-user"></i></span>
                   <input type="text" required>
                   <label> Full name </label>
          		</div>
				<div class="input-box">
			       <span class="icon"><i class="fa fa-envelope"></i></span>
                   <input type="text" required>
                   <label> Phone number </label>
          		</div>
                <div class="input-box">
                    <span class="icon"><i class="fa fa-lock"></i></span>
                    <input type="ID number" required>
                    <label> ID number</label>
                </div>
					<div class="input-box">
                    <span class="icon"><i class="fa fa-lock"></i></span>
                    <input type="Age" required>
                    <label> Age</label>
                </div>
					<div class="input-box">
                    <span class="icon"><i class="fa fa-lock"></i></span>
                    <input type="Birth day" required>
                    <label> Birth day</label>
                </div>
				<div class="remember-forgot">
				   <label><input type="checkbox">I agree to the terms & conditions </label>
				</div>  
                <button type="submit"class="btn"><a href="file:///C:/Users/nikes/Desktop/education%20application/loginE.html">Register</a></button>
                <div class="login">	
                    
                </div>			
				<br>
					<button type="submit"class="btn"><a href="file:///C:/Users/nikes/Desktop/education%20application/Cources.html">Join Courses</a></button>
                <div class="login">	
                    
                </div>	
            </form>
			
        </div>
		</div>
		
    </div>		  
 	
  
	</body>
	
</html>
